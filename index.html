<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abdul Rafay's Portfolio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <style>
    /* General Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      background-color: #0f0f0f;
      color: #33ff33;
      overflow: hidden;
    }

    /* Top Navigation Bar */
    .topnav {
      position: fixed;
      top: 0;
      width: 100%;
      background-color: #1a1a1a;
      overflow: hidden;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      padding: 0 10%;
    }

    .topnav a {
      color: #f2f2f2;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
      font-size: 17px;
    }

    .topnav a:hover {
      background-color: #ddd;
      color: black;
    }

    /* Main Content */
    #main {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      transition: margin-left .5s;
      padding: 16px;
      gap: 30px;
      margin-top: 60px;
    }

    /* Terminal Window */
    #terminal {
      max-width: 800px;
      background-color: #000;
      padding: 20px;
      border-radius: 5px;
      box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
      overflow-y: auto;
      height: 70vh;
      position: relative;
    }

    .output {
      white-space: pre-wrap;
      margin-bottom: 10px;
    }

    .prompt {
      display: flex;
    }

    .prompt span {
      margin-right: 5px;
    }

    .blinker {
      animation: blink 1s steps(2, start) infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    /* Typing Effect */
    .typing {
      display: inline-block;
      overflow: hidden;
      white-space: nowrap;
      border-right: 2px solid;
      animation: typing 3s steps(30, end), blink-caret .75s step-end infinite;
    }

    @keyframes typing {
      from {
        width: 0;
      }
      to {
        width: 100%;
      }
    }

    @keyframes blink-caret {
      from, to {
        border-color: transparent;
      }
      50% {
        border-color: #33ff33;
      }
    }

    /* Project Cards */
    #project-preview {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 40px auto;
      max-width: 1000px;
      flex-wrap: wrap;
    }

    .project-card {
      background: #111;
      color: #0f0;
      border: 1px solid #33ff33;
      padding: 15px;
      width: 200px;
      height: 100px;
      font-size: 0.9rem;
      box-shadow: 0 0 5px #0f0;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .project-card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #0f0;
    }

    .project-card .project-info {
      position: absolute;
      bottom: -100%;
      left: 0;
      background: rgba(0, 0, 0, 0.8);
      width: 100%;
      padding: 10px;
      transition: bottom 0.3s ease;
    }

    .project-card:hover .project-info {
      bottom: 0;
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background-color: #1a1a1a;
      color: #f2f2f2;
      text-align: center;
      padding: 10px 0;
    }

    /* Mobile Responsiveness */
    @media screen and (max-width: 600px) {
      .topnav {
        flex-direction: column;
        align-items: center;
      }
      #terminal {
        margin: 20px;
        height: 60vh;
      }
      #main {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>

  <!-- Top Navigation Bar -->
  <div class="topnav">
    <a href="#">Home</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </div>

  <!-- Main Content -->
  <div id="main">
    <div id="terminal">
      <div class="output" id="output"></div>
      <div class="prompt">
        <span>guest@abdulrafay:~$</span>
        <input type="text" id="input" autofocus autocomplete="off" style="background: transparent; border: none; color: #33ff33; outline: none; width: 100%; font-family: inherit; font-size: inherit;">
      </div>
    </div>
  </div>

  <!-- Project Section -->
  <section id="project-preview">
    <!-- Project cards will be inserted here by JavaScript -->
  </section>

  <!-- Footer -->
  <footer>
    <p>Contact: abdulrafaybinrauf@gmail.com | GitHub: <a href="https://github.com/abdulrafay1-4" target="_blank" style="color: #33ff33;">abdulrafay1-4</a></p>
  </footer>

  <script>
    // Terminal Functionality
    const terminalOutput = document.getElementById('output');
    const inputField = document.getElementById('input');

        const commands = {
      help: 'Available commands: about, projects, contact, clear',
      about: 'I am a Cyber Security student at FAST-NUCES with a passion for terminal-based UI and web development.',
      projects: 'Displaying project cards below...',
      contact: 'Email: abdulrafaybinrauf@gmail.com\nGitHub: github.com/abdulrafay1-4',
      clear: () => terminalOutput.innerHTML = ''
    };

    const typeOutput = (text, delay = 15) => {
      return new Promise(resolve => {
        let i = 0;
        const line = document.createElement('div');
        terminalOutput.appendChild(line);
        const typer = () => {
          if (i < text.length) {
            line.textContent += text.charAt(i);
            i++;
            setTimeout(typer, delay);
          } else {
            resolve();
          }
        };
        typer();
      });
    };

    inputField.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') {
        const cmd = inputField.value.trim().toLowerCase();
        const echo = document.createElement('div');
        echo.className = 'output';
        echo.textContent = `guest@abdulrafay:~$ ${cmd}`;
        terminalOutput.appendChild(echo);

        if (commands[cmd]) {
          const result = typeof commands[cmd] === 'function' ? commands[cmd]() : await typeOutput(commands[cmd]);
        } else {
          await typeOutput(`Command not found: '${cmd}'. Type 'help' for available commands.`);
        }

        inputField.value = '';
        terminalOutput.scrollTop = terminalOutput.scrollHeight;
      }
    });

    // Load GitHub Repos
    async function loadGitHubRepos() {
      const container = document.getElementById('project-preview');
      const res = await fetch('https://api.github.com/users/abdulrafay1-4/repos?sort=updated&per_page=6');
      const data = await res.json();

      data.forEach(repo => {
        const card = document.createElement('div');
        card.className = 'project-card';
        card.innerHTML = `
          <strong>${repo.name}</strong>
          <div class="project-info">
            <p>${repo.description || 'No description provided.'}</p>
            <a href="${repo.html_url}" target="_blank" style="color: #00ffff;">View Repo</a>
          </div>
        `;
        container.appendChild(card);
      });
    }

    loadGitHubRepos();
  </script>
</body>
</html>
